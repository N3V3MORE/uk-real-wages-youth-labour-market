name: Full pipeline evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock

      - name: Install
        run: |
          python -m pip install -r requirements.txt -c requirements.lock
          python -m pip install --no-build-isolation --no-deps -e .

      - name: Rebuild locked pipeline and package evidence
        run: python -m uk_wages.pipeline --all --locked

      - name: Upload v2 evidence package
        uses: actions/upload-artifact@v6
        with:
          name: uk-wages-v2-evidence
          path: releases/v2/evidence
          if-no-files-found: error
