experiment_name: "sensitivity_base_2020"
description: "Shift the baseline year to 2020 to test dependence on the pre-pandemic comparison."
assumptions:
  deflator: "cpih"
  inflation_period: "april"
  baseline_year: 2020
  wage_measure: "median_weekly"
  work_status: "all"
  sex: "all"
outputs:
  compare_to: "baseline"
  metrics:
    - real_pct_change_since_baseline
    - sign_flip_vs_baseline
    - rank_change_by_age_group
    - young_worker_gap

