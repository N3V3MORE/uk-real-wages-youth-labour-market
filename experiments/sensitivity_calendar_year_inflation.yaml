experiment_name: "sensitivity_calendar_year_inflation"
description: "Use calendar-year average CPIH rather than April CPIH for annual ASHE deflation."
spec_tier: "core"
assumptions:
  deflator: "cpih"
  inflation_period: "calendar_year_average"
  baseline_year: 2019
  wage_measure: "median_weekly"
  work_status: "all"
  sex: "all"
outputs:
  compare_to: "baseline"
  metrics:
    - real_pct_change_since_baseline
    - sign_flip_vs_baseline
    - rank_change_by_age_group
    - young_worker_gap
