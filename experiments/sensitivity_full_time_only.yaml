experiment_name: "sensitivity_full_time_only"
description: "Restrict to full-time employee jobs to test whether composition by work status drives the result."
spec_tier: "stress"
assumptions:
  deflator: "cpih"
  inflation_period: "april"
  baseline_year: 2019
  wage_measure: "median_weekly"
  work_status: "full_time"
  sex: "all"
outputs:
  compare_to: "baseline"
  metrics:
    - real_pct_change_since_baseline
    - sign_flip_vs_baseline
    - rank_change_by_age_group
    - young_worker_gap
