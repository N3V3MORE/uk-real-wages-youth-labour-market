base_url: "https://www.ons.gov.uk"

inflation:
  source_name: "ONS Consumer Price Inflation Time Series"
  dataset_id: "MM23"
  default_deflator: "CPIH"
  cpih_series_id: "L522"
  cpi_series_id: "D7BT"
  notes: "CPIH and CPI all-items indices, 2015=100."
  series:
    - name: "cpih"
      series_id: "L522"
      dataset_id: "MM23"
      url: "https://www.ons.gov.uk/generator?format=csv&uri=%2Feconomy%2Finflationandpriceindices%2Ftimeseries%2Fl522%2Fmm23"
    - name: "cpi"
      series_id: "D7BT"
      dataset_id: "MM23"
      url: "https://www.ons.gov.uk/generator?format=csv&uri=%2Feconomy%2Finflationandpriceindices%2Ftimeseries%2Fd7bt%2Fmm23"

